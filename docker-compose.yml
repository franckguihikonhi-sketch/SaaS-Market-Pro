# Stack de développement local. En production, l'API se connecte à
# PostgreSQL Supabase (DATABASE_URL) : ce postgres local ne sert qu'au dev.
#
#   docker compose up postgres adminer   # juste la BDD + un client web
#   docker compose up                    # BDD + API + Frontend (hot reload)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketpro
      POSTGRES_PASSWORD: marketpro
      POSTGRES_DB: marketpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpro -d marketpro"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    working_dir: /repo/apps/api
    command: pnpm start:dev
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://marketpro:marketpro@postgres:5432/marketpro?schema=public
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/repo/apps/api
      - /repo/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: build
    working_dir: /repo/apps/web
    command: pnpm dev
    env_file:
      - apps/web/.env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/repo/apps/web
      - /repo/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
